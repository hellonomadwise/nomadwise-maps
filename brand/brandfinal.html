<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">
<style>
 *{box-sizing:border-box} body{margin:0;font-family:'Roboto',Arial,sans-serif;color:#1f2c3d;background:#fff}
 .wrap{max-width:900px;margin:0 auto;padding:46px 40px 70px}
 h1{font-size:28px;margin:0 0 4px} .sub{color:#5f6570;margin:0 0 34px;font-weight:500}
 h2{font-size:15px;color:#ff444f;margin:38px 0 16px;text-transform:uppercase;letter-spacing:1px}
 .top{display:flex;gap:34px;align-items:center;flex-wrap:wrap}
 .ic{border-radius:22.3%;overflow:hidden;box-shadow:0 8px 22px rgba(31,44,61,.16);flex:none}
 .txt{font-family:'Roboto';font-weight:900;font-size:40px;letter-spacing:-1px;white-space:nowrap}
 .lockrow{display:flex;flex-direction:column;gap:0}
 .lock{display:flex;align-items:center;gap:12px;padding:22px 26px;border-radius:14px}
 .lock.dark{background:#1f2c3d}
 .mk{width:50px;height:50px;flex:none}
 .sizes{display:flex;align-items:flex-end;gap:18px}
 .pal{display:flex;gap:26px;flex-wrap:wrap}
 .sw{display:flex;align-items:center;gap:11px}
 .chip{width:52px;height:52px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
 .sl{font-size:13px;font-weight:600} .sl span{color:#8a929c;font-weight:500;font-size:12px}
 .grad{background:linear-gradient(135deg,#ff5a63,#f4303c)}
