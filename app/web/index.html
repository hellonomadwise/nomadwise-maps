<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nomadwise Maps — find cafes & coworking spaces you can actually work from.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nomadwise Maps">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nomadwise Maps</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JS — __GOOGLE_MAPS_WEB_KEY__ is replaced by CI -->
  <script src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_WEB_KEY__&loading=async"></script>

  <style>
    html, body { margin:0; padding:0; height:100%; background:#ffffff; }
    #splash {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      background:linear-gradient(135deg,#ff5a63,#f4303c);
      font-family:Roboto,Arial,sans-serif; color:#fff;
    }
    #splash img { width:96px; height:96px; border-radius:22.3%; }
    #splash .t { font-weight:900; font-size:22px; letter-spacing:-0.5px; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-192.png" alt="">
    <div class="t">nomadwise maps</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) s.remove();
    });
  </script>
</body>
</html>
