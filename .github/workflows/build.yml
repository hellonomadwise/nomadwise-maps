name: Build Nomadwise Maps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ---------- one-time platform scaffolding ----------
      # Generates android/ ios/ web/ folders on the first run, applies our
      # custom platform files, bakes the app icons, and commits the result
      # back so Codemagic (iOS/TestFlight) can build from the same repo.
      - name: Scaffold platforms (first run only)
        run: |
          if [ ! -d app/android ]; then
            cd app
            flutter create --org com.nomadwise --project-name nomadwise_maps \
              --platforms=android,ios,web .
            cd ..
            # apply overrides (manifest, index.html, AppDelegate)
            cp platform_overrides/android/app/src/main/AndroidManifest.xml app/android/app/src/main/AndroidManifest.xml
            cp platform_overrides/web/index.html app/web/index.html
            cp platform_overrides/ios/Runner/AppDelegate.swift app/ios/Runner/AppDelegate.swift
            # merge Info.plist additions
            python3 scripts/merge_plist.py platform_overrides/ios/Runner/Info-additions.plist app/ios/Runner/Info.plist
            cd app
            flutter pub get
            dart run flutter_launcher_icons
            cd ..
            git config user.name "nomadwise-bot"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "chore: scaffold platform folders + icons [skip ci]" || true
            git push
          fi

      # ---------- inject keys ----------
      - name: Inject API keys
        run: |
          sed -i "s|__GOOGLE_MAPS_ANDROID_KEY__|${{ secrets.GOOGLE_MAPS_ANDROID_KEY }}|" app/android/app/src/main/AndroidManifest.xml
          sed -i "s|__GOOGLE_MAPS_WEB_KEY__|${{ secrets.GOOGLE_MAPS_WEB_KEY }}|" app/web/index.html

      - name: Pub get
        run: flutter pub get 2>&1 | tee -a ../ci_debug.log
        working-directory: app

      - name: Analyze (report only)
        run: flutter analyze 2>&1 | tee -a ../ci_debug.log || true
        working-directory: app

      - name: Run tests
        run: flutter test 2>&1 | tee -a ../ci_debug.log
        working-directory: app

      # Fill in venue coordinates from Google (skips venues already done).
      # Runs only when the needed secrets exist; safe to run every build.
      - name: Enrich venue coordinates
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Server-side job: uses the server key (no website restriction);
          # falls back to the browser key if the server key isn't set yet.
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_SERVER_KEY || secrets.GOOGLE_PLACES_KEY }}
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -n "$GOOGLE_PLACES_KEY" ]; then
            python3 scripts/enrich_venues.py
          else
            echo "Skipping enrichment — secrets not set yet."
          fi

      # ---------- web build -> GitHub Pages ----------
      - name: Build web
        run: |
          flutter build web --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_PLACES_KEY=${{ secrets.GOOGLE_PLACES_KEY }} \
            2>&1 | tee -a ../ci_debug.log
        working-directory: app


      # Render the built app in a real phone-sized browser and keep a
      # screenshot + console log, so display bugs on testers' phones can
      # be diagnosed remotely.
      - name: Smoke render check
        continue-on-error: true
        run: |
          # Serve under the same /nomadwise-maps/ path the real site uses.
          cd app/build
          ln -sfn web nomadwise-maps
          python3 -m http.server 8765 &
          sleep 2
          cd ../..
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          const fs = await import('fs');
          const browser = await chromium.launch();
          const logs = [];
          async function run(label, opts, shot) {
            const page = await browser.newPage({ viewport: { width: 390, height: 844 }, ...opts });
            page.on('console', m => logs.push(`[${label}][${m.type()}] ${m.text()}`));
            page.on('pageerror', e => logs.push(`[${label}][pageerror] ${e.message}\n${e.stack || ''}`));
            await page.goto('http://localhost:8765/nomadwise-maps/', { waitUntil: 'networkidle' }).catch(e => logs.push(`[${label}][goto] ${e.message}`));
            await page.waitForTimeout(12000);
            await page.screenshot({ path: shot });
            await page.close();
          }
          await run('default', {}, 'smoke.png');
          await run('enUS', { locale: 'en-US' }, 'smoke_enus.png');
          fs.writeFileSync('smoke_console.log', logs.join('\n'));
          await browser.close();
          EOF
          npm i playwright@1.49.1 --no-save 2>&1 | tail -1
          npx playwright install --with-deps chromium 2>&1 | tail -1
          node smoke.mjs

      - name: Publish smoke artifacts
        if: always()
        continue-on-error: true
        run: |
          mkdir -p /tmp/smokekeep
          cp smoke.png smoke_enus.png smoke_console.log /tmp/smokekeep/ 2>/dev/null || true
          git config user.name "nomadwise-bot"
          git config user.email "actions@github.com"
          git checkout -B ci-debug
          mkdir -p ci-debug
          cp /tmp/smokekeep/smoke.png ci-debug/smoke.png 2>/dev/null || true
          cp /tmp/smokekeep/smoke_enus.png ci-debug/smoke_enus.png 2>/dev/null || true
          cp /tmp/smokekeep/smoke_console.log ci-debug/smoke_console.log 2>/dev/null || true
          git add -f ci-debug/ 2>/dev/null || true
          git commit -m "ci: smoke render artifacts" || true
          git push -f origin ci-debug || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

      # ---------- Android APK ----------
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_PLACES_KEY=${{ secrets.GOOGLE_PLACES_KEY }}
        working-directory: app

      - uses: actions/upload-artifact@v4
        with:
          name: nomadwise-maps-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      # On ANY failure, publish the collected log to a ci-debug branch so it
      # can be read and fixed from the development session.
      - name: Publish failure log
        if: failure()
        run: |
          mkdir -p ci-debug
          cp ci_debug.log ci-debug/last_failure.log 2>/dev/null || echo "log file missing — failure happened before Pub get" > ci-debug/last_failure.log
          git config user.name "nomadwise-bot"
          git config user.email "actions@github.com"
          git checkout -B ci-debug
          git add -f ci-debug/last_failure.log
          git commit -m "ci: failure log"
          git push -f origin ci-debug

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
