name: Enrich venues (coordinates + Google snapshot)

on:
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * *' # daily, keeps the cached Google details fresh

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fill venue coordinates from Google Places
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_SERVER_KEY || secrets.GOOGLE_PLACES_KEY }}
        run: python3 scripts/enrich_venues.py
