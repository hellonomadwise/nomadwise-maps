<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Find cafes and coworking spaces you can actually work from.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Nomadwise Maps">
  <meta property="og:description" content="Find cafes and coworking spaces you can actually work from.">
  <meta property="og:url" content="https://hellonomadwise.github.io/nomadwise-maps/">
  <meta property="og:image" content="https://hellonomadwise.github.io/nomadwise-maps/icons/og_square.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://hellonomadwise.github.io/nomadwise-maps/icons/og_square.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nomad Maps">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nomadwise Maps</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JS — __GOOGLE_MAPS_WEB_KEY__ is replaced by CI -->
  <script src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_WEB_KEY__&loading=async"></script>
  <script>
    // Hide Google's own on-map buttons (camera/zoom/fullscreen etc).
    // The app draws its own controls where the design wants them.
    (function () {
      function patch() {
        if (!(window.google && google.maps && google.maps.Map)) {
          return setTimeout(patch, 100);
        }
        var Orig = google.maps.Map;
        google.maps.Map = function (el, opts) {
          opts = Object.assign({}, opts, {
            cameraControl: false,
            zoomControl: false,
            fullscreenControl: false,
            streetViewControl: false,
            mapTypeControl: false,
            rotateControl: false
          });
          return new Orig(el, opts);
        };
        google.maps.Map.prototype = Orig.prototype;
        Object.setPrototypeOf(google.maps.Map, Orig);
      }
      patch();
    })();
  </script>

  <style>
    html, body { margin:0; padding:0; height:100%; background:#ffffff; }
    #splash {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      background:linear-gradient(135deg,#ff5a63,#f4303c);
      font-family:Roboto,Arial,sans-serif; color:#fff;
    }
    #splash img { width:96px; height:96px; border-radius:22.3%; }
    #splash .t { font-weight:900; font-size:22px; letter-spacing:-0.5px; }
  </style>
  <script>
    // Some browsers report broken language settings, which crashes the
    // app at startup ("Incorrect locale information provided").
    // Keep only valid languages; fall back to English if none survive.
    (function () {
      function ok(tag) {
        try { new Intl.Locale(tag); return true; } catch (e) { return false; }
      }
      try {
        var langs = Array.from(navigator.languages || []).filter(ok);
        if (!langs.length) {
          langs = ok(navigator.language) ? [navigator.language] : ['en-US'];
        }
        Object.defineProperty(Navigator.prototype, 'languages',
            { get: function () { return langs; } });
        if (!ok(navigator.language)) {
          Object.defineProperty(Navigator.prototype, 'language',
              { get: function () { return langs[0]; } });
        }
      } catch (e) { /* never block startup */ }
    })();
  </script>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-192.png" alt="">
    <div class="t">nomadwise maps</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) s.remove();
    });
  </script>
</body>
</html>
